<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glide Data Grid + TitanJS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glideapps/glide-data-grid@6.0.3/dist/index.css">
    
    <style>
        :root {
            --bg: #ffffff;
            --fg: #333333;
            --muted: #f9f9f9;
            --muted-fg: #888888;
            --border: #eaeaea;
            --accent: #0066cc;
        }
        body { 
            font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--fg);
            background: var(--bg);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 { font-weight: normal; margin: 0; color: #111; }
        h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 32px; }
        h2 { font-size: 14px; margin-top: 32px; margin-bottom: 16px; }
        
        .section, .card, .sheet-container { margin-bottom: 32px; border: 1px solid var(--border); padding: 24px; }
        
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .btn, button {
            background: transparent;
            border: 1px solid #ccc;
            color: var(--fg);
            padding: 4px 12px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: border-color 0.1s;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .btn:hover, button:hover { border-color: var(--fg); }
        .btn:disabled, button:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border); }
        
        .btn-secondary { border-color: #ccc; }
        
        input[type="number"], input[type="text"] {
            font-family: inherit;
            font-size: 12px;
            padding: 4px 8px;
            border: 1px solid #ccc;
            background: var(--bg);
            color: var(--fg);
            width: 120px;
            box-sizing: border-box;
            transition: border-color 0.1s;
        }
        input:focus { outline: none; border-color: var(--fg); }
        input.readonly { background: var(--muted); color: var(--muted-fg); border-color: var(--border); }
        
        p, .info { color: var(--muted-fg); margin-bottom: 16px; }
        
        /* Table Styles (Benchmark) */
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 12px; }
        th, td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
        th { font-weight: normal; color: var(--muted-fg); }
        .winner { color: #2e8b57; }
        .loser { color: #b22222; }
        
        /* Logs */
        .log { background: var(--muted); padding: 16px; border: 1px solid var(--border); overflow-y: auto; height: 200px; font-size: 12px; color: var(--fg); white-space: pre-wrap; }
        
        /* Basic Example Specific */
        .row { display: flex; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
        .cell-group { display: flex; align-items: center; gap: 8px;}
        label { font-size: 12px; color: var(--muted-fg); }
        .wide-input { width: 280px !important; }
        
        .grid { display: grid; grid-template-columns: repeat(16, 40px); gap: 1px; background: var(--border); border: 1px solid var(--border); padding: 1px; width: max-content; margin-top: 16px; }
        .grid-cell { background: var(--bg); height: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 11px; }
        
        .struct-grid { display: grid; grid-template-columns: 80px 100px 140px; gap: 1px; background: var(--border); border: 1px solid var(--border); width: max-content; margin-top: 16px; }
        .struct-cell { background: var(--bg); padding: 6px 8px; text-align: center; font-size: 12px; }
        .struct-header { background: var(--muted); color: var(--muted-fg); }
        
        /* Glide Example Specific */
        .sheet-header { font-size: 14px; font-weight: normal; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: #111; }
        .header-controls button { margin-left: 8px; margin-bottom: 0; }
    </style>
        <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@glideapps/glide-data-grid": "https://esm.sh/@glideapps/glide-data-grid@6.0.3?external=react,react-dom",
        "htm": "https://esm.sh/htm"
      }
    }
    </script>
</head>
<body>
    <a href="index.html" style="display: inline-block; margin-bottom: 20px; color: var(--muted-fg); text-decoration: none; ">&larr; Back to Examples Page</a>
    <h1>Glide Data Grid + TitanJS</h1>
    <p style="color: var(--muted-fg); margin-bottom: 2rem;">A complete React-based spreadsheet UI built with Glide Data Grid. Demonstrates cross-sheet references, native undo/redo, and massive CSV pasting.</p>
    <div id="root"></div>

    
    <script type="module">
        import React, { useState, useEffect, useCallback, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { DataEditor, GridCellKind } from '@glideapps/glide-data-grid';
        import htm from 'htm';
        import { initTitan } from '../titan.js';

        const html = htm.bind(React.createElement);

        function getExcelColumn(i) {
            let letter = '';
            while (i >= 0) {
                letter = String.fromCharCode(65 + (i % 26)) + letter;
                i = Math.floor(i / 26) - 1;
            }
            return letter;
        }

        function SheetComponent({ name, sheet, rows, cols, onRowsColsChange, updateTrigger, cellInputs }) {
            const columns = useMemo(() => {
                return Array.from({ length: cols }).map((_, i) => ({
                    title: getExcelColumn(i),
                    id: `col_${i}`,
                    width: 100
                }));
            }, [cols]);

            const getCellContent = useCallback(([col, row]) => {
                const cell = sheet.get({row, col});
                let data = cellInputs[sheet.id]?.[row]?.[col] || cell.display;

                return {
                    kind: GridCellKind.Text,
                    allowOverlay: true,
                    displayData: cell.display.toString(),
                    data: data.toString(),
                    readonly: false,
                };
            }, [sheet, updateTrigger, cellInputs]);

            const onCellEdited = useCallback((cell, newValue) => {
                const [col, row] = cell;
                const val = newValue.data;
                
                if (!cellInputs[sheet.id]) cellInputs[sheet.id] = {};
                if (!cellInputs[sheet.id][row]) cellInputs[sheet.id][row] = {};
                cellInputs[sheet.id][row][col] = val;

                sheet.set({row, col}, val);
            }, [sheet, cellInputs]);

            const onRowAppended = useCallback(() => {
                onRowsColsChange(rows + 1, cols);
            }, [rows, cols, onRowsColsChange]);

            const onPaste = useCallback((target, values) => {
                const [startCol, startRow] = target;
                let maxR = rows;
                let maxC = cols;
                const updates = [];

                for (let i = 0; i < values.length; i++) {
                    let rowData = values[i];
                    if (rowData.length === 1 && rowData[0].includes('	')) {
                        rowData = rowData[0].split('	');
                    } else if (rowData.length === 1 && rowData[0].includes(',')) {
                        rowData = rowData[0].split(',');
                    }

                    const r = startRow + i;
                    maxR = Math.max(maxR, r + 1);
                    maxC = Math.max(maxC, startCol + rowData.length);

                    if (!cellInputs[sheet.id]) cellInputs[sheet.id] = {};
                    if (!cellInputs[sheet.id][r]) cellInputs[sheet.id][r] = {};

                    for (let j = 0; j < rowData.length; j++) {
                        const c = startCol + j;
                        const val = rowData[j].trim();
                        cellInputs[sheet.id][r][c] = val;
                        updates.push({ sheet: sheet.id, cell: {row: r, col: c}, value: val });
                    }
                }
                
                if (maxR > rows || maxC > cols) {
                    onRowsColsChange(maxR, maxC);
                }
                
                if (updates.length > 0) {
                    sheet.titan.setCells(updates);
                }
                return true;
            }, [sheet, rows, cols, onRowsColsChange, cellInputs]);

            const onDelete = useCallback((selection) => {
                if (!selection || !selection.current || !selection.current.range) return;
                const range = selection.current.range;
                const updates = [];

                for (let r = range.y; r < range.y + range.height; r++) {
                    for (let c = range.x; c < range.x + range.width; c++) {
                        if (cellInputs[sheet.id]?.[r]) {
                            delete cellInputs[sheet.id][r][c];
                        }
                        updates.push({ sheet: sheet.id, cell: {row: r, col: c}, value: "" });
                    }
                }

                if (updates.length > 0) {
                    sheet.titan.setCells(updates);
                }
            }, [sheet, cellInputs]);

            return html`
                                <div className="sheet-container">
                    <div className="sheet-header">
                        <span>${name}</span>
                    </div>
                    <${DataEditor}
                        
                        columns=${columns}
                        rows=${rows}
                        getCellContent=${getCellContent}
                        onCellEdited=${onCellEdited}
                        onPaste=${onPaste}
                        onDelete=${onDelete}
                        getCellsForSelection=${true}
                        rowMarkers="both"
                        height=${200}
                        width="100%"
                        onRowAppended=${onRowAppended}
                        trailingRowOptions=${{ sticky: false, tint: true, hint: "New row..." }}
                    />
                </div>
            `;
        }

        function App() {
            const [engine, setEngine] = useState(null);
            const [sheets, setSheets] = useState([]);
            const [dimensions, setDimensions] = useState({});
            const [updateTrigger, setUpdateTrigger] = useState(0);
            const cellInputs = useRef({});

            useEffect(() => {
                async function load() {
                    const Titan = await initTitan();
                    const e = new Titan();
                    
                    const s1 = e.addSheet("Sheet1");
                    const s2 = e.addSheet("Sheet2");
                    
                    setSheets([s2, s1]);
                    setDimensions({
                        [s1.id]: { rows: 5, cols: 5 },
                        [s2.id]: { rows: 5, cols: 5 }
                    });
                    
                    const unsubscribe = e.onCellsChanged((changes) => {
                        setUpdateTrigger(prev => prev + 1);
                    });

                    cellInputs.current[s1.id] = { 0: {0: "15"}, 1: {0: "25"}, 2: {0: "=SUM(A1:A2)"} };
                    cellInputs.current[s2.id] = { 0: {0: "=Sheet1!A3 * 2"} };

                    e.setCells([
                        { sheet: s1.id, cell: "A1", value: "15" },
                        { sheet: s1.id, cell: "A2", value: "25" },
                        { sheet: s1.id, cell: "A3", value: "=SUM(A1:A2)" },
                        { sheet: s2.id, cell: "A1", value: "=Sheet1!A3 * 2" }
                    ]);

                    setEngine(e);
                    
                    return () => unsubscribe();
                }
                
                let cleanup = () => {};
                load().then(c => { if(c) cleanup = c; });
                return () => cleanup();
            }, []);

            if (!engine) return html`<div style=${{ padding: '20px' }}>Loading Titan Engine...</div>`;

            return html`
                <div>
                    <div style=${{ display: 'flex', justifyContent: 'flex-end', marginBottom: '15px' }}>
                        <div className="header-controls">
                            <button onClick=${() => { try { engine.undo(); } catch(e) { console.log(e); } }} className="btn-secondary">Undo</button>
                            <button onClick=${() => { try { engine.redo(); } catch(e) { console.log(e); } }} className="btn-secondary">Redo</button>
                        </div>
                    </div>
                    
                    ${sheets.map(sheet => html`
                        <${SheetComponent} 
                            key=${sheet.id} 
                            name=${sheet.name} 
                            sheet=${sheet} 
                            rows=${dimensions[sheet.id].rows} 
                            cols=${dimensions[sheet.id].cols}
                            onRowsColsChange=${(r, c) => setDimensions(prev => ({ ...prev, [sheet.id]: { rows: r, cols: c } }))}
                            updateTrigger=${updateTrigger}
                            cellInputs=${cellInputs.current}
                        />
                    `)}
                </div>
            `;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>

    <div id="portal" style="position: fixed; top: 0; left: 0; z-index: 9999;"></div>
</body>
</html>
