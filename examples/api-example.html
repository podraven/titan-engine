<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TitanJS High-Level API</title>
    
    <style>
        :root {
            --bg: #ffffff;
            --fg: #333333;
            --muted: #f9f9f9;
            --muted-fg: #888888;
            --border: #eaeaea;
            --accent: #0066cc;
        }
        body { 
            font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--fg);
            background: var(--bg);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 { font-weight: normal; margin: 0; color: #111; }
        h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 32px; }
        h2 { font-size: 14px; margin-top: 32px; margin-bottom: 16px; }
        
        .section, .card, .sheet-container { margin-bottom: 32px; border: 1px solid var(--border); padding: 24px; }
        
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .btn, button {
            background: transparent;
            border: 1px solid #ccc;
            color: var(--fg);
            padding: 4px 12px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: border-color 0.1s;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .btn:hover, button:hover { border-color: var(--fg); }
        .btn:disabled, button:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border); }
        
        .btn-secondary { border-color: #ccc; }
        
        input[type="number"], input[type="text"] {
            font-family: inherit;
            font-size: 12px;
            padding: 4px 8px;
            border: 1px solid #ccc;
            background: var(--bg);
            color: var(--fg);
            width: 120px;
            box-sizing: border-box;
            transition: border-color 0.1s;
        }
        input:focus { outline: none; border-color: var(--fg); }
        input.readonly { background: var(--muted); color: var(--muted-fg); border-color: var(--border); }
        
        p, .info { color: var(--muted-fg); margin-bottom: 16px; }
        
        /* Table Styles (Benchmark) */
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 12px; }
        th, td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
        th { font-weight: normal; color: var(--muted-fg); }
        .winner { color: #2e8b57; }
        .loser { color: #b22222; }
        
        /* Logs */
        .log { background: var(--muted); padding: 16px; border: 1px solid var(--border); overflow-y: auto; height: 200px; font-size: 12px; color: var(--fg); white-space: pre-wrap; }
        
        /* Basic Example Specific */
        .row { display: flex; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
        .cell-group { display: flex; align-items: center; gap: 8px;}
        label { font-size: 12px; color: var(--muted-fg); }
        .wide-input { width: 280px !important; }
        
        .grid { display: grid; grid-template-columns: repeat(16, 40px); gap: 1px; background: var(--border); border: 1px solid var(--border); padding: 1px; width: max-content; margin-top: 16px; }
        .grid-cell { background: var(--bg); height: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 11px; }
        
        .struct-grid { display: grid; grid-template-columns: 80px 100px 140px; gap: 1px; background: var(--border); border: 1px solid var(--border); width: max-content; margin-top: 16px; }
        .struct-cell { background: var(--bg); padding: 6px 8px; text-align: center; font-size: 12px; }
        .struct-header { background: var(--muted); color: var(--muted-fg); }
        
        /* Glide Example Specific */
        .sheet-header { font-size: 14px; font-weight: normal; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: #111; }
        .header-controls button { margin-left: 8px; margin-bottom: 0; }
    </style>
</head>
<body>
    <a href="index.html" style="display: inline-block; margin-bottom: 20px; color: var(--muted-fg); text-decoration: none; ">&larr; Back to Examples Page</a>
    <h1>TitanJS High-Level API</h1>
    <p>Check the console or the log below for event outputs.</p>
    <button id="run">Run Batch Updates</button>
    <button id="undo">Undo</button>
    <button id="redo">Redo</button>
    
    <h3>Reactivity Log:</h3>
    <div id="log" class="log"></div>

    <script type="module">
        import { initTitan } from '../titan.js';

        const logEl = document.getElementById('log');
        function log(msg) {
            logEl.textContent += msg + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function main() {
            const Titan = await initTitan();
            const engine = new Titan();
            
            // 1. Easy sheet management
            const sheet1 = engine.addSheet("Sales");

            // 4. Reactivity & Events
            engine.onCellsChanged((changes) => {
                log(`[Event] ${changes.length} cells updated:`);
                changes.forEach(c => log(`   - ${c.sheetName}!${c.a1} = ${c.cell.display}`));
            });

            // 2. Cell Reading & Writing
            log("Setting Sales!A1 to 100...");
            sheet1.set("A1", 100);
            
            log("Setting Sales!B1 to =A1*2...");
            sheet1.set("B1", "=A1*2");

            document.getElementById('run').onclick = () => {
                log("\nRunning Bulk Operations...");
                // 3. Bulk Operations (Batch Manager)
                sheet1.setRange("A2", [
                    [10, "=A2*2"],
                    [20, "=A3*2"],
                    [30, "=A4*2"]
                ]);
            };

            document.getElementById('undo').onclick = () => {
                log("\nUndoing...");
                try {
                    engine.undo();
                } catch (e) {
                    log(`Error: ${e}`);
                }
            };

            document.getElementById('redo').onclick = () => {
                log("\nRedoing...");
                try {
                    engine.redo();
                } catch (e) {
                    log(`Error: ${e}`);
                }
            };
        }
        main();
    </script>
</body>
</html>
